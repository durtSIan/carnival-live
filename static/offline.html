<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#0a1320">
  <title>Offline - Carnival Live</title>
  <style>
    :root{color-scheme:dark;--ink:#f5f7fb;--muted:#9ba8bc;--panel:#141c2a;--line:#29364b;--lime:#b6f13e}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:20px;background:#08101b;color:var(--ink);font-family:Inter,Segoe UI,Arial,sans-serif}
    main{width:min(100%,420px);padding:24px;border:1px solid var(--line);border-radius:16px;background:var(--panel);text-align:center}
    .mark{display:inline-grid;place-items:center;width:48px;height:48px;margin-bottom:12px;border-radius:12px;background:var(--lime);color:#08101b;font-weight:900}
    h1{margin:0 0 8px;font-size:22px}p{margin:0;color:var(--muted);line-height:1.45}
  </style>
</head>
<body>
  <main>
    <span class="mark">CL</span>
    <h1>You are offline</h1>
    <p>Carnival Live needs a connection for fresh scores. Reconnect and refresh to keep following the games.</p>
  </main>
</body>
</html>

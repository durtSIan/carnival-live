services:
  - type: web
    name: carnival-live
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "app:create_app()"
    envVars:
      - key: CARNIVAL_TIMEZONE
        value: Australia/Darwin
      - key: CARNIVAL_SECRET_KEY
        generateValue: true
      - key: CARNIVAL_SECURE_COOKIES
        value: "true"
